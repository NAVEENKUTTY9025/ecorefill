<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, height=device-height, viewport-fit=cover">
    <title>EcoRefill | Login to Zero-Waste Store</title>
    <link rel="icon" type="image/png" href="https://images.unsplash.com/photo-1542601906990-b4d3fb778b09?w=64&h=64&fit=crop">
    <script src="tailwind.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* Light mode (default) */
        :root {
            --bg-primary: #FFFFFF;
            --text-primary: #111111;
            --card-bg: #FFFFFF;
            --border-color: #E5E7EB;
            --leaf-green: #4CAF50;
        }
        
        /* Dark mode */
        .dark {
            --bg-primary: #0F0F0F;
            --text-primary: #F5F5F5;
            --card-bg: #1F1F1F;
            --border-color: #2A2A2A;
        }
        
        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color 0.3s ease, color 0.3s ease;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: fixed;
        }
        
        /* Main wrapper - fixed fullscreen, no scroll */
        .app-wrapper {
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        
        /* Logo in Top Left Corner - with proper spacing */
        .logo-header {
            position: fixed;
            top: 24px;
            left: 24px;
            z-index: 1000;
        }
        
        [dir="rtl"] .logo-header {
            left: auto;
            right: 24px;
        }
        
        /* Responsive adjustments for mobile - ensure no touch with container */
        @media (max-width: 768px) {
            .logo-header {
                top: 20px;
                left: 20px;
            }
            [dir="rtl"] .logo-header {
                left: auto;
                right: 20px;
            }
        }
        
        @media (max-width: 640px) {
            .logo-header {
                top: 16px;
                left: 16px;
            }
            [dir="rtl"] .logo-header {
                left: auto;
                right: 16px;
            }
        }
        
        /* Brand colors - matching index.html */
        .logo-icon, .logo-text {
            color: #4CAF50 !important;
        }
        
        .logo-brand {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 900;
            letter-spacing: -0.02em;
            text-decoration: none;
            transition: transform 0.2s ease;
            background: rgba(76, 175, 80, 0.1);
            padding: 8px 16px;
            border-radius: 48px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(76, 175, 80, 0.2);
        }
        
        .logo-brand:hover {
            transform: scale(1.02);
            background: rgba(76, 175, 80, 0.15);
        }
        
        /* Fixed Controls - Top Right Corner - with proper spacing */
        .fixed-controls {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 1000;
            display: flex;
            gap: 12px;
        }
        
        [dir="rtl"] .fixed-controls {
            right: auto;
            left: 24px;
        }
        
        /* Responsive adjustments for mobile */
        @media (max-width: 768px) {
            .fixed-controls {
                top: 20px;
                right: 20px;
                gap: 10px;
            }
            [dir="rtl"] .fixed-controls {
                right: auto;
                left: 20px;
            }
        }
        
        @media (max-width: 640px) {
            .fixed-controls {
                top: 16px;
                right: 16px;
                gap: 8px;
            }
            [dir="rtl"] .fixed-controls {
                right: auto;
                left: 16px;
            }
        }
        
        .control-btn-circle {
            background: rgba(76, 175, 80, 0.2);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(76, 175, 80, 0.3);
            padding: 8px 14px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
        }
        
        .dark .control-btn-circle {
            background: rgba(76, 175, 80, 0.25);
            border-color: rgba(76, 175, 80, 0.4);
        }
        
        .control-btn-circle:hover {
            background: rgba(76, 175, 80, 0.4);
            transform: scale(1.02);
        }
        
        @media (max-width: 640px) {
            .control-btn-circle {
                padding: 6px 12px;
                font-size: 11px;
                gap: 4px;
            }
        }
        
        /* Content area - perfectly centered vertically and horizontally */
        .content-area {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        /* Login Card Styles */
        .login-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            max-width: 460px;
            width: 100%;
            margin: 0 auto;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            position: relative;
            z-index: 1;
        }
        
        /* Ensure card has proper margin on mobile to avoid touching top/bottom elements */
        @media (max-width: 768px) {
            .content-area {
                padding: 1.5rem;
            }
            .login-card {
                margin: 0 auto;
            }
        }
        
        @media (max-width: 640px) {
            .content-area {
                padding: 1rem;
            }
        }
        
        .input-field {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.2s;
            font-size: 0.95rem;
        }
        
        .input-field:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.2);
        }
        
        /* Buttons */
        .btn-primary {
            background-color: #4CAF50;
            transition: all 0.2s;
        }
        .btn-primary:hover {
            background-color: #3d8b40;
            transform: translateY(-1px);
        }
        
        /* RTL Support */
        [dir="rtl"] { 
            text-align: right; 
            direction: rtl; 
        }
        
        /* Animation */
        @keyframes fadeSlideUp {
            from { 
                opacity: 0; 
                transform: translateY(30px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }
        .fade-slide-up {
            animation: fadeSlideUp 0.6s ease-out;
        }
        
        /* Link styles */
        a {
            transition: color 0.2s ease;
        }
        
        /* Icon positioning */
        .input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }
        
        [dir="rtl"] .input-icon {
            left: auto;
            right: 12px;
        }
        
        [dir="rtl"] .pl-10 {
            padding-left: 1rem;
            padding-right: 2.5rem;
        }
        
        /* Custom checkbox styling */
        .custom-checkbox:checked {
            background-color: #4CAF50;
            border-color: #4CAF50;
        }
        
        /* Ensure no scrollbars appear */
        ::-webkit-scrollbar {
            display: none;
        }
        
        /* Simple decorative elements */
        .bg-pattern {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            top: 0;
            pointer-events: none;
            z-index: 0;
        }
        
        .bg-pattern::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(76, 175, 80, 0.03) 0%, transparent 70%);
            border-radius: 50%;
            top: -150px;
            right: -150px;
        }
        
        .bg-pattern::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(76, 175, 80, 0.03) 0%, transparent 70%);
            border-radius: 50%;
            bottom: -200px;
            left: -200px;
        }
        
        .dark .bg-pattern::before,
        .dark .bg-pattern::after {
            background: radial-gradient(circle, rgba(76, 175, 80, 0.08) 0%, transparent 70%);
        }
    </style>
    <script>
        tailwind.config = { 
            darkMode: 'class', 
            theme: { 
                extend: { 
                    colors: { 
                        primary: '#4CAF50', 
                        sage: '#4CAF50', 
                        wood: '#E6D5B8' 
                    } 
                } 
            } 
        }
    </script>
</head>
<body>

<div class="app-wrapper">
    <!-- Decorative Background Pattern -->
    <div class="bg-pattern"></div>
    
    <!-- Logo in Top Left Corner (with proper spacing) -->
    <div class="logo-header">
        <a href="index.html" class="logo-brand">
            <i data-lucide="droplets" class="w-6 h-6 sm:w-7 sm:h-7 md:w-8 md:h-8 logo-icon"></i>
            <span class="text-lg sm:text-xl md:text-2xl font-black tracking-tight">
                <span class="logo-text">Eco</span><span class="logo-text">Refill</span>
            </span>
        </a>
    </div>

    <!-- Fixed Controls - Top Right Corner (Dark Mode + RTL) with proper spacing -->
    <div class="fixed-controls">
        <button onclick="toggleDirection()" class="control-btn-circle" id="dirToggleBtn">
            <i data-lucide="arrow-left-right" class="w-3.5 h-3.5"></i>
            <span id="dirTextFixed">LTR</span>
        </button>
        <button onclick="toggleTheme()" class="control-btn-circle">
            <i data-lucide="moon" class="w-3.5 h-3.5 dark:hidden"></i>
            <i data-lucide="sun" class="w-3.5 h-3.5 hidden dark:block text-yellow-400"></i>
             <span class="dark:hidden"></span>
            <span class="hidden dark:inline"></span>
        </button>
    </div>

    <!-- Main Content Area - Perfectly Centered (Vertical + Horizontal) -->
    <div class="content-area">
        <div class="fade-slide-up w-full max-w-md px-4">
            <!-- Login Card -->
            <div class="login-card rounded-2xl shadow-2xl p-6 sm:p-8">
                <div class="text-center mb-6">
                   
                    <h2 class="text-2xl sm:text-3xl font-extrabold tracking-tight" style="color: #4CAF50 !important;">Welcome Back</h2>
                    <p class="text-gray-500 dark:text-gray-400 mt-2 text-sm">Sign in to your zero-waste account</p>
                </div>
                
                <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-5">
                    <div>
                        <label class="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">Email Address</label>
                        <div class="relative">
                            <i data-lucide="mail" class="input-icon w-4 h-4 text-gray-400"></i>
                            <input type="email" id="email" required class="input-field pl-10" placeholder="hello@ecorefill.com">
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">Password</label>
                        <div class="relative">
                            <i data-lucide="lock" class="input-icon w-4 h-4 text-gray-400"></i>
                            <input type="password" id="password" required class="input-field pl-10" placeholder="••••••••">
                        </div>
                    </div>
                    
                    <div class="flex items-center justify-between flex-wrap gap-2">
                        <label class="flex items-center gap-2 text-sm cursor-pointer">
                            <input type="checkbox" class="rounded border-gray-300 text-[#4CAF50] focus:ring-[#4CAF50] custom-checkbox">
                            <span class="text-gray-600 dark:text-gray-400">Remember me</span>
                        </label>
                        <a href="#" class="text-sm text-[#4CAF50] font-semibold hover:underline transition">Forgot password?</a>
                    </div>
                    
                    <button type="submit" class="w-full btn-primary text-white font-bold py-3 rounded-xl transition-all duration-200 shadow-md flex items-center justify-center gap-2 group">
                        <i data-lucide="log-in" class="w-5 h-5 group-hover:translate-x-0.5 transition"></i>
                        Sign In
                    </button>
                </form>
                
                <div class="mt-6 text-center">
                    <p class="text-sm text-gray-500 dark:text-gray-400">
                        Don't have an account? 
                        <a href="register.html" class="text-[#4CAF50] font-bold hover:underline transition">Create account</a>
                    </p>
                </div>
                
                <div class="relative my-6">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-300 dark:border-gray-700"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-3 text-gray-500 dark:text-gray-400" style="background-color: var(--card-bg);">Or continue with</span>
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="handleSocialLogin('Google')" class="flex items-center justify-center gap-2 py-2.5 rounded-xl border border-gray-300 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all duration-200">
                        <i data-lucide="globe" class="w-4 h-4"></i>
                        <span class="text-sm font-medium">Google</span>
                    </button>
                    <button onclick="handleSocialLogin('Apple')" class="flex items-center justify-center gap-2 py-2.5 rounded-xl border border-gray-300 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all duration-200">
                        <i data-lucide="apple" class="w-4 h-4"></i>
                        <span class="text-sm font-medium">Apple</span>
                    </button>
                </div>
            </div>
            
            <!-- Eco Inspiration Badge (subtle, no footer) -->
            <div class="mt-6 text-center flex items-center justify-center gap-2 text-xs text-gray-400 dark:text-gray-500">
                <i data-lucide="recycle" class="w-3.5 h-3.5"></i>
                <span>Every refill saves plastic. Join the movement!</span>
                <i data-lucide="heart" class="w-3.5 h-3.5 text-[#4CAF50]"></i>
            </div>
        </div>
    </div>
</div>

<script>
    // Initialize Lucide icons
    lucide.createIcons();
    
    // Theme Toggle Function (matches index.html behavior)
    function toggleTheme() { 
        document.documentElement.classList.toggle('dark'); 
        localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light'); 
        // Recreate icons to ensure proper icon display after theme change
        setTimeout(() => lucide.createIcons(), 10);
    }
    
    // Direction Toggle Function (RTL/LTR)
    function toggleDirection() { 
        const html = document.documentElement; 
        const dirTextFixed = document.getElementById('dirTextFixed'); 
        if (html.dir === 'rtl') { 
            html.dir = 'ltr'; 
            if(dirTextFixed) dirTextFixed.innerText = 'LTR'; 
        } else { 
            html.dir = 'rtl'; 
            if(dirTextFixed) dirTextFixed.innerText = 'RTL'; 
        } 
        // Recreate icons to adjust RTL layout
        setTimeout(() => { lucide.createIcons(); }, 50); 
    }
    
    // Login Form Handler
    function handleLogin(event) {
        event.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        if(email && password) {
            // Simple validation - show success message
            const userName = email.split('@')[0];
            alert(`✨ Welcome back, ${userName}! ✨\n\nRedirecting to your dashboard...`);
            // Simulate redirect to index.html (main page)
            window.location.href = "index.html";
        } else {
            alert("⚠️ Please enter both email and password to continue.");
        }
    }
    
    // Social Login Handler
    function handleSocialLogin(provider) {
        alert(`🔐 ${provider} authentication demo\n\nIn a production environment, this would connect to ${provider} OAuth.`);
    }
    
    // Load saved theme from localStorage (matches index.html behavior)
    if (localStorage.getItem('theme') === 'dark') { 
        document.documentElement.classList.add('dark'); 
    }
    
    // Set initial direction text based on current dir
    document.addEventListener('DOMContentLoaded', () => { 
        lucide.createIcons();
        const dirTextFixed = document.getElementById('dirTextFixed');
        if(document.documentElement.dir === 'rtl') {
            if(dirTextFixed) dirTextFixed.innerText = 'RTL';
        } else {
            if(dirTextFixed) dirTextFixed.innerText = 'LTR';
        }
        
        // Add keyboard support for Enter key
        const inputs = document.querySelectorAll('.input-field');
        inputs.forEach(input => {
            input.addEventListener('keypress', (e) => {
                if(e.key === 'Enter') {
                    e.preventDefault();
                    const form = document.getElementById('loginForm');
                    if(form) form.dispatchEvent(new Event('submit'));
                }
            });
        });
    });
    
    // Prevent any accidental scrolling
    window.addEventListener('touchmove', function(e) {
        e.preventDefault();
    }, { passive: false });
    
    // Also prevent wheel scrolling
    window.addEventListener('wheel', function(e) {
        e.preventDefault();
    }, { passive: false });
    
    // Prevent keyboard scrolling
    window.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === 'PageUp' || e.key === 'PageDown' || e.key === 'Home' || e.key === 'End') {
            e.preventDefault();
        }
    });
    
    // Ensure body remains fixed and no scrollbars appear
    document.body.style.overflow = 'hidden';
    document.documentElement.style.overflow = 'hidden';
    
    // Add resize handler to ensure proper centering on orientation change
    window.addEventListener('resize', function() {
        // Force reflow to ensure centering stays correct
        document.body.style.display = 'none';
        document.body.offsetHeight;
        document.body.style.display = '';
    });
</script>
</body>
</html>
